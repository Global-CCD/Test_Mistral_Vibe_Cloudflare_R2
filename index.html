<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare R2 Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cloudflare R2 Upload</h1>
        <p class="subtitle">Upload files directly to your R2 bucket</p>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" multiple>
            <label for="fileInput" class="upload-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>Click to select files or drag and drop</span>
            </label>
            <div class="file-list" id="fileList"></div>
        </div>
        
        <button id="uploadBtn" class="btn">Upload to R2</button>
        
        <div class="status" id="status"></div>
        
        <div class="instructions">
            <h3>How it works</h3>
            <p>This demo requires a backend service to generate pre-signed URLs for Cloudflare R2.</p>
            <p>See <a href="README.md">README.md</a> for setup instructions.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
